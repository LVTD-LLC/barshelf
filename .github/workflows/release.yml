name: Build release DMG

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-14
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD != '' && secrets.APPLE_KEYCHAIN_PASSWORD != '' }}
      HAS_APPLE_NOTARIZATION: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Import Developer ID certificate
        if: env.HAS_APPLE_SIGNING == 'true'
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Resolve signing identity
        if: env.HAS_APPLE_SIGNING == 'true'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | awk -F '"' '/Developer ID Application/ { print $2; exit }')
          if [[ -z "$IDENTITY" ]]; then
            echo "No Developer ID Application identity found" >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Using signing identity: $IDENTITY"

      - name: Build app bundle
        run: ./Scripts/build_app.sh

      - name: Create DMG
        run: ./Scripts/create_dmg.sh

      - name: Notarize and staple DMG
        if: env.HAS_APPLE_SIGNING == 'true' && env.HAS_APPLE_NOTARIZATION == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./Scripts/notarize_dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BarShelf.dmg
          path: dist/BarShelf.dmg

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/BarShelf.dmg --clobber
