name: Build release DMG

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build macOS DMG
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        run: ./Scripts/build_app.sh

      - name: Create DMG
        run: ./Scripts/create_dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BarShelf.dmg
          path: dist/BarShelf.dmg

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/BarShelf.dmg --clobber
