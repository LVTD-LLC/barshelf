name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run unit tests
        run: swift test --configuration debug --enable-code-coverage
      - name: Build release binary
        run: swift build -c release
      - name: Build app bundle
        run: ./Scripts/build_app.sh
